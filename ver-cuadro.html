<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Cuadro Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Fondo 100% blanco como pediste */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Fallback */
            height: 100dvh; /* Altura estricta dinámica (respeta barras de navegacion moviles) */
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px 20px 60px 20px; /* Aumentado padding inferior para librar la barra del navegador */
            box-sizing: border-box;
        }

        .img-wrapper {
            flex: 1; /* Toma todo el espacio disponible */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0; /* Crucial para que flexbox permita a la imagen encogerse */
            margin-bottom: 20px;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Encaja en pantalla sin perder proporciones */
            box-shadow: 0 10px 40px rgba(0,0,0,0.25); 
            border-radius: 2px;
            border: 15px solid #000000; /* Marco más grueso como pediste */
        }

        .btn-back {
            flex-shrink: 0;
            display: inline-block;
            padding: 14px 32px;
            background: #f1f1f1;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #e2e2e2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Contenedor flexible que exprime la imagen a la altura de tu pantalla -->
        <div class="img-wrapper">
            <img src="./assets/collage-cuadro.png" alt="Tu cuadro digital">
        </div>
        <a href="index.html" class="btn-back">⬅ Volver a la App AR</a>
    </div>
</body>
</html>
