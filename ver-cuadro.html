<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Cuadro Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Fondo 100% blanco como pediste */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); /* Sombra elegante */
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .btn-back {
            display: inline-block;
            padding: 12px 28px;
            background: #f1f1f1;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #e2e2e2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Mostramos la imagen con fondo blanco controlado por nosotros, no por el navegador -->
        <img src="./assets/collage-cuadro.png" alt="Tu cuadro digital">
        <br>
        <a href="index.html" class="btn-back">⬅ Volver a la App AR</a>
    </div>
</body>
</html>
