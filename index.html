<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>💕 Para Ti Mi Amor</title>
    <meta name="description" content="Una experiencia mágica de realidad aumentada creada con amor">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="./lib/mindar-image-aframe.prod.js"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .hidden { display: none !important; }

        /* ======== LANDING SCREEN ======== */
        #landing {
            position: fixed; inset: 0; z-index: 100;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 40%, #0f3460 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
            transition: opacity 0.6s ease;
        }
        #landing.fade-out { opacity: 0; pointer-events: none; }

        .landing-particles { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
        .particle {
            position: absolute; background: rgba(192, 132, 252, 0.25); border-radius: 50%;
            animation: float-p 6s ease-in-out infinite;
        }
        @keyframes float-p {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
            25% { opacity: 0.6; } 50% { transform: translateY(-40px) scale(1.5); opacity: 0.3; } 75% { opacity: 0.15; }
        }

        .landing-content { 
            position: relative; z-index: 2; width: 100%; max-width: 420px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .heart-beat { font-size: 3rem; display: inline-block; animation: hb 1.5s ease-in-out infinite; filter: drop-shadow(0 0 18px rgba(255,107,157,0.6)); margin-bottom: 12px; }
        @keyframes hb { 0%,100%{transform:scale(1)} 15%{transform:scale(1.25)} 30%{transform:scale(1)} 45%{transform:scale(1.15)} 60%{transform:scale(1)} }

        .landing-title {
            font-family: 'Great Vibes', cursive; font-size: 2.6rem; font-weight: 400;
            background: linear-gradient(135deg, #ff6b9d, #c084fc, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 30px;
        }

        /* Collage preview on landing */
        .collage-link { 
            display: inline-block; 
            text-decoration: none; 
            margin-bottom: 12px; 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
        }
        .collage-preview {
            width: 260px; height: 260px; border-radius: 12px; overflow: hidden;
            border: 3px solid rgba(192,132,252,0.3);
            box-shadow: 0 0 40px rgba(192,132,252,0.15); transition: transform 0.3s, box-shadow 0.3s;
        }
        .collage-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .collage-link:hover .collage-preview { transform: scale(1.03); box-shadow: 0 0 50px rgba(192,132,252,0.3); }
        .collage-hint { color: rgba(255,255,255,0.35); font-size: 0.72rem; margin-bottom: 32px; }

        .btn-ar {
            background: linear-gradient(135deg, #ff6b9d, #c084fc); color: white; border: none;
            padding: 16px 36px; border-radius: 50px; font-family: 'Inter', sans-serif;
            font-size: 1.05rem; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 30px rgba(192,132,252,0.35); transition: all 0.3s ease;
        }
        .btn-ar:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(192,132,252,0.5); }
        .btn-ar:active { transform: translateY(-1px) scale(0.99); }
        .btn-ar:disabled { opacity: 0.7; cursor: wait; transform: none; }
        .btn-ar .sparkle { animation: tw 1.5s ease-in-out infinite; }
        @keyframes tw { 0%,100%{opacity:1;transform:scale(1)rotate(0)} 50%{opacity:0.6;transform:scale(1.2)rotate(20deg)} }



        /* ======== SCANNING OVERLAY ======== */
        #scanning {
            position: fixed; inset: 0; z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .scan-frame { width: 220px; height: 220px; position: relative; margin-bottom: 28px; }
        .sc { position: absolute; width: 36px; height: 36px; border-color: rgba(192,132,252,0.8); border-style: solid; border-width: 0; animation: pulse-c 2s ease-in-out infinite; }
        .sc.tl { top:0;left:0;border-top-width:3px;border-left-width:3px;border-radius:4px 0 0 0; }
        .sc.tr { top:0;right:0;border-top-width:3px;border-right-width:3px;border-radius:0 4px 0 0; }
        .sc.bl { bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 4px; }
        .sc.br { bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 4px 0; }
        @keyframes pulse-c { 0%,100%{opacity:0.4;border-color:rgba(192,132,252,0.4)} 50%{opacity:1;border-color:rgba(192,132,252,1)} }

        .scan-label {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 12px 22px; border-radius: 50px; color: rgba(255,255,255,0.9); font-size: 0.88rem;
            animation: fadeUp 0.6s ease;
        }
        .scan-label .cam-ico { animation: bob 2s ease-in-out infinite; }
        @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

        /* ======== DELETE EFFECTS OVERLAY ======== */
        /* CSS para los overrides base se mantiene */

        /* Music button */
        .music-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 30;
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: white; font-size: 1.3rem; cursor: pointer; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s;
        }
        .music-btn:hover { transform: scale(1.1); }

        /* A-Frame overrides */
        .a-enter-vr { display: none !important; }
        a-scene { position: fixed !important; top: 0; left: 0; z-index: 1; }

        /* Small screens */
        @media (max-height: 700px) {
            .fl-1,.fl-2,.fl-3,.fl-4 { width: 70px; height: 70px; }
            .fl-5,.fl-6,.fl-7,.fl-8 { width: 55px; height: 55px; }
            .fl-9,.fl-10,.fl-11,.fl-12 { width: 45px; height: 45px; }
            .love-text { font-size: 1.5rem; }
            .msg-wrap { bottom: 4%; }
            .landing-title { font-size: 2rem; }
            .collage-preview { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <!-- ====== LANDING ====== -->
    <div id="landing">
        <div class="landing-particles" id="particles"></div>
        <div class="landing-content">
            <div class="heart-beat">💕</div>
            <h1 class="landing-title">Para Ti Mi Amor</h1>

            <a href="./ver-cuadro.html" target="_self" class="collage-link" title="Ver imagen completa">
                <div class="collage-preview">
                    <img src="./assets/collage-cuadro.png" alt="Nuestras fotos">
                </div>
            </a>
            <p class="collage-hint">Toca la imagen para verla completa 🔍</p>

            <button class="btn-ar" id="btn-start">

    <!-- ====== SCANNING ====== -->

            <div class="sc tl"></div><div class="sc tr"></div>

        <div class="scan-label">

    </div>

    <!-- ====== MUSIC ====== -->
    <button class="music-btn hidden" id="music-btn" aria-label="Música">
        <span id="music-ico">🎵</span>
    </button>
    <audio id="bgm" loop preload="auto">
        <source src="./assets/musica.mp3" type="audio/mpeg">
    </audio>

    <!-- ====== ESTABILIZADOR AR v5 — SENSOR FUSION (Giroscopio + Tracking) ====== -->
    <!-- Usa el giroscopio del celular para saber si el dispositivo está REALMENTE quieto -->
    <!-- Si el giroscopio dice "quieto" pero MindAR mueve → es RUIDO, se ignora casi todo -->
    <script>
        // === SENSOR FUSION: Detectar movimiento REAL con giroscopio ===
        // Funciona en: Samsung S21 FE (Android), iPhone 12 Pro Max (iOS), cualquier smartphone
        window._gyroSpeed = 0;
        window._gyroAvailable = false;
        let _prevGyroA = null, _prevGyroB = null, _prevGyroG = null;
        
        function handleOrientation(e) {
            window._gyroAvailable = true;
            if (_prevGyroA !== null) {
                const da = Math.abs(e.alpha - _prevGyroA);
                const db = Math.abs(e.beta - _prevGyroB);
                const dg = Math.abs(e.gamma - _prevGyroG);
                const speed = Math.min(da, 360 - da) + db + dg;
                
                // FAST ATTACK / SLOW RELEASE
                // Si haces un movimiento brusco, reacciona en 0 milisegundos (CERO LAG).
                // Si te quedas quieto, los temblores caen suavemente hasta congelarse.
                if (speed > window._gyroSpeed) {
                    window._gyroSpeed = speed;
                } else {
                    window._gyroSpeed = window._gyroSpeed * 0.85 + speed * 0.15;
                }
            }
            _prevGyroA = e.alpha;
            _prevGyroB = e.beta;
            _prevGyroG = e.gamma;
        }

        // Inicializar giroscopio (con permiso de iOS si es necesario)
        async function initGyroscope() {
            try {
                // iOS 13+ requiere permiso explícito para DeviceOrientation
                if (typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        console.log('Giroscopio iOS activado ✅');
                    } else {
                        console.warn('Permiso de giroscopio denegado en iOS');
                    }
                } else {
                    // Android y otros: no necesita permiso
                    window.addEventListener('deviceorientation', handleOrientation);
                    console.log('Giroscopio activado ✅');
                }
            } catch(e) {
                console.warn('Giroscopio no disponible:', e);
            }
        }

        // === COMPONENTE SMOOTH-FOLLOW CON SENSOR FUSION (TOTAL FREEZE) ===
        AFRAME.registerComponent('smooth-follow', {
            schema: {
                target: { type: 'selector' },
                // Alpha cuando giroscopio confirma quietud: 0.0 significa CONGELADO TOTAL
                gyroStillAlpha: { type: 'number', default: 0.0 },
                // Alpha mínimo sin giroscopio
                minAlpha: { type: 'number', default: 0.01 },
                // Alpha máximo en movimiento rápido
                maxAlpha: { type: 'number', default: 0.8 },
                // Sensibilidad a velocidad
                speedSensitivity: { type: 'number', default: 50 },
                // Umbral donde se considera TOTALMENTE QUIETO el celular (restaurado)
                gyroStillThreshold: { type: 'number', default: 0.15 },
                // Umbral donde empieza a moverse intencionalmente (restaurado)
                gyroMoveThreshold: { type: 'number', default: 0.35 },
                // Factor de amortiguación de rotación (rotación más estable)
                rotDamping: { type: 'number', default: 0.15 },
                // Factor de amortiguación de escala (ELIMINA efecto de "respiración")
                scaleDamping: { type: 'number', default: 0.05 }
            },
            init: function() {
                // Estado suavizado
                this._pos = new THREE.Vector3();
                this._quat = new THREE.Quaternion();
                this._scale = new THREE.Vector3(1, 1, 1);
                this._prevPos = new THREE.Vector3();
                // Pre-alocar vectores
                this._tmpP = new THREE.Vector3();
                this._tmpQ = new THREE.Quaternion();
                this._tmpS = new THREE.Vector3();
                this._fastSpeed = 0;
                this._ready = false;
                this._visible = false;
            },
            tick: function(time, delta) {
                const tracker = this.data.target;
                if (!tracker) return;
                const obj3d = tracker.object3D;

                // TARGET LOST
                if (!obj3d.visible) {
                    if (this._visible) {
                        this.el.object3D.visible = false;
                        this._visible = false;
                        this._ready = false;
                        this._fastSpeed = 0;
                    }
                    return;
                }

                // Leer posición del tracker
                const p = this._tmpP;
                const q = this._tmpQ;
                const s = this._tmpS;
                obj3d.updateWorldMatrix(true, false);
                obj3d.matrixWorld.decompose(p, q, s);

                const self = this.el.object3D;

                // Primera detección: snap directo
                if (!this._ready) {
                    this._pos.copy(p);
                    this._quat.copy(q);
                    this._scale.copy(s);
                    this._prevPos.copy(p);
                    self.position.copy(this._pos);
                    self.quaternion.copy(this._quat);
                    self.scale.copy(this._scale);
                    self.visible = true;
                    this._visible = true;
                    this._ready = true;
                    return;
                }

                // === MICRO-JITTER LOCK (ANTI-TEMBLOR EXTREMO EN MACRO) ===
                // Cuando te acercas mucho al cuadro, un error de cámara de 1mm se magnifica en las capas flotantes.
                // Hysteresis: Si tu mano está firme (gyro < 0.3) y la cámara reporta un movimiento de "ruido" minúsculo,
                // MATA el ruido obligando a la lectura a ser idéntica al cuadro anterior. Congelado absoluto.
                if (window._gyroAvailable && window._gyroSpeed < 0.3) {
                    if (p.distanceTo(this._pos) < 0.015 && 
                        q.angleTo(this._quat) < 0.05 && 
                        s.distanceTo(this._scale) < 0.05) {
                        p.copy(this._pos);
                        q.copy(this._quat);
                        s.copy(this._scale);
                    }
                }

                // Velocidad del tracking
                const speed = p.distanceTo(this._prevPos);
                this._prevPos.copy(p);

                // FAST ATTACK / SLOW RELEASE para el tracker
                if (speed > this._fastSpeed) {
                    this._fastSpeed = speed; // Cero lag al atrapar el movimiento nuevo
                } else {
                    this._fastSpeed = this._fastSpeed * 0.7 + speed * 0.3;
                }
                const avgSpeed = this._fastSpeed;

                // === SENSOR FUSION: Control TOTAL de quietud ===
                let gyroFactor = 1.0;
                if (window._gyroAvailable) {
                    if (window._gyroSpeed <= this.data.gyroStillThreshold) {
                        // CELULAR FÍSICAMENTE QUIETO = TODO RUIDO ES FALSO
                        gyroFactor = 0.0;
                    } else if (window._gyroSpeed >= this.data.gyroMoveThreshold) {
                        // CELULAR MOVIÉNDOSE = CONFIAR EN TRACKER
                        gyroFactor = 1.0;
                    } else {
                        // TRANSICIÓN SUAVE (evita saltos al empezar a mover)
                        gyroFactor = (window._gyroSpeed - this.data.gyroStillThreshold) / 
                                     (this.data.gyroMoveThreshold - this.data.gyroStillThreshold);
                    }
                }

                // Si gyroFactor === 0, currentMinAlpha = 0.0 (CONGELADO TOTAL)
                const currentMinAlpha = gyroFactor === 0.0 ? this.data.gyroStillAlpha : this.data.minAlpha;
                
                // El ruido del tracker se ignora si gyroFactor es bajo
                const dynamicSpeed = avgSpeed * gyroFactor;

                // Alpha adaptativo
                const rawAlpha = currentMinAlpha + 
                    Math.min(dynamicSpeed * this.data.speedSensitivity, this.data.maxAlpha - currentMinAlpha);

                // Frame-rate independiente
                const dt = Math.min(delta || 16.67, 50) / 1000;
                const alpha = 1 - Math.pow(1 - rawAlpha, dt * 60);

                // === ELIMINACIÓN DE TEMBLOR EN CAPAS Z ===
                // La escala controla el tamaño = distancia percibida (la super suavizamos)
                const scaleAlpha = alpha * this.data.scaleDamping;
                // La rotación amplifica las capas en Z como un péndulo (la suavizamos x6)
                const rotAlpha = alpha * this.data.rotDamping;

                // Interpolar (si alpha=0, NO HACE NADA, queda ESTATICO MATEMATICAMENTE)
                this._pos.lerp(p, alpha);
                this._quat.slerp(q, rotAlpha);
                this._scale.lerp(s, scaleAlpha);

                // Aplicar
                self.position.copy(this._pos);
                self.quaternion.copy(this._quat);
                self.scale.copy(this._scale);

                if (!this._visible) {
                    self.visible = true;
                    this._visible = true;
                }
            }
        });
    </script>

    <!-- ====== AR SCENE ====== -->
    <a-scene
        mindar-image="imageTargetSrc: ./assets/cuadro.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.1; filterBeta: 50; missTolerance: 10; warmupTolerance: 12;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <img id="layer2" src="./assets/layers/layer2_flower_bg.png" crossorigin="anonymous">
            <img id="layer3" src="./assets/layers/layer3_cross_photos.png" crossorigin="anonymous">
            <img id="layer4" src="./assets/layers/layer4_cross_flowers.png" crossorigin="anonymous">
            <img id="layer5" src="./assets/layers/layer5_corner_photos.png" crossorigin="anonymous">
            <img id="layer6" src="./assets/layers/layer6_corner_flowers.png" crossorigin="anonymous">
            <img id="layer7" src="./assets/layers/layer7_center_photo.png" crossorigin="anonymous">
            <img id="layer8" src="./assets/layers/layer8_center_flowers.png" crossorigin="anonymous">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- TRACKER INVISIBLE: recibe los datos crudos de MindAR (con su jitter natural) -->
        <a-entity mindar-image-target="targetIndex: 0" id="ar-tracker"></a-entity>

        <!-- CONTENIDO VISIBLE: sigue al tracker con interpolación suave (SIN jitter) -->
        <a-entity id="ar-content" visible="false"
            smooth-follow="target: #ar-tracker; gyroStillAlpha: 0.0; minAlpha: 0.01; maxAlpha: 0.8; speedSensitivity: 50; gyroStillThreshold: 0.15; gyroMoveThreshold: 0.35; rotDamping: 0.15; scaleDamping: 0.05;">

            <!-- BASE: Fondo de Flores (z=0) — aparece primero -->
            <a-image src="#layer2" position="0 0 0" width="1.0" height="1.0"
                material="transparent: true; alphaTest: 0.05; opacity: 0;"
                animation__fadein="property: material.opacity; from: 0; to: 1; dur: 600; easing: easeOutQuad; startEvents: ar-pop;"
                class="ar-layer"></a-image>

            <!-- TIER 1: Fotos en Cruz — sale de z=0 a z=0.15 -->
            <a-image src="#layer3" position="0 0 0" width="1.0" height="1.0"
                material="transparent: true; alphaTest: 0.05; opacity: 0;"
                animation__fadein="property: material.opacity; from: 0; to: 1; dur: 500; delay: 200; easing: easeOutQuad; startEvents: ar-pop;"
                animation__zout="property: position; from: 0 0 0; to: 0 0 0.15; dur: 800; delay: 200; easing: easeOutBack; startEvents: ar-pop;"
                class="ar-layer"></a-image>

            <!-- Flores de la cruz — sale a z=0.20 -->
            <a-image src="#layer4" position="0 0 0" width="1.0" height="1.0"
                material="transparent: true; alphaTest: 0.05; opacity: 0;"
                animation__fadein="property: material.opacity; from: 0; to: 1; dur: 500; delay: 350; easing: easeOutQuad; startEvents: ar-pop;"
                animation__zout="property: position; from: 0 0 0; to: 0 0 0.20; dur: 800; delay: 350; easing: easeOutBack; startEvents: ar-pop;"
                class="ar-layer"></a-image>

            <!-- TIER 2: Fotos Esquinas — sale a z=0.35 -->
            <a-image src="#layer5" position="0 0 0" width="1.0" height="1.0"
                material="transparent: true; alphaTest: 0.05; opacity: 0;"
                animation__fadein="property: material.opacity; from: 0; to: 1; dur: 500; delay: 500; easing: easeOutQuad; startEvents: ar-pop;"
                animation__zout="property: position; from: 0 0 0; to: 0 0 0.35; dur: 900; delay: 500; easing: easeOutBack; startEvents: ar-pop;"
                class="ar-layer"></a-image>

            <!-- Flores esquinas — sale a z=0.40 -->
            <a-image src="#layer6" position="0 0 0" width="1.0" height="1.0"
                material="transparent: true; alphaTest: 0.05; opacity: 0;"
                animation__fadein="property: material.opacity; from: 0; to: 1; dur: 500; delay: 650; easing: easeOutQuad; startEvents: ar-pop;"
                animation__zout="property: position; from: 0 0 0; to: 0 0 0.40; dur: 900; delay: 650; easing: easeOutBack; startEvents: ar-pop;"
                class="ar-layer"></a-image>

            <!-- TIER 3: Foto Central — sale a z=0.55 (la que más flota) -->
            <a-image src="#layer7" position="0 0 0" width="1.0" height="1.0"
                material="transparent: true; alphaTest: 0.05; opacity: 0;"
                animation__fadein="property: material.opacity; from: 0; to: 1; dur: 500; delay: 800; easing: easeOutQuad; startEvents: ar-pop;"
                animation__zout="property: position; from: 0 0 0; to: 0 0 0.55; dur: 1000; delay: 800; easing: easeOutBack; startEvents: ar-pop;"
                class="ar-layer"></a-image>

            <!-- Flores centro — sale a z=0.60 (la más cercana a ti) -->
            <a-image src="#layer8" position="0 0 0" width="1.0" height="1.0"
                material="transparent: true; alphaTest: 0.05; opacity: 0;"
                animation__fadein="property: material.opacity; from: 0; to: 1; dur: 500; delay: 950; easing: easeOutQuad; startEvents: ar-pop;"
                animation__zout="property: position; from: 0 0 0; to: 0 0 0.60; dur: 1000; delay: 950; easing: easeOutBack; startEvents: ar-pop;"
                class="ar-layer"></a-image>

        </a-entity>

    </a-scene>

    <script>
        // === Forzar cámara principal 1x (la del medio) en Samsung S21 FE ===
        // El S21 FE tiene 3 cámaras traseras. Chrome por defecto elige la primera
        // (ultra-wide 0.5x). Necesitamos seleccionar la SEGUNDA (main 1x) por su deviceId.
        let _mainCameraId = null;
        const _originalGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);

        // Detectar la cámara del medio ANTES de que MindAR la pida
        async function detectMainCamera() {
            try {
                // Necesitamos un stream temporal para obtener permisos y labels
                const tempStream = await _originalGetUserMedia({ video: { facingMode: 'environment' } });
                tempStream.getTracks().forEach(t => t.stop()); // Cerrar inmediatamente

                const devices = await navigator.mediaDevices.enumerateDevices();
                const rearCams = devices.filter(d => 
                    d.kind === 'videoinput' && 
                    (d.label.toLowerCase().includes('back') || 
                     d.label.toLowerCase().includes('rear') || 
                     d.label.toLowerCase().includes('trasera') ||
                     d.label.toLowerCase().includes('environment') ||
                     d.label.includes('0'))
                );

                console.log('Cámaras traseras detectadas:', rearCams.map(c => c.label));

                // Si hay múltiples cámaras traseras, la segunda suele ser la principal 1x
                if (rearCams.length >= 2) {
                    _mainCameraId = rearCams[1].deviceId;
                    console.log('Cámara 1x seleccionada:', rearCams[1].label);
                } else {
                    // Fallback: buscar entre TODAS las cámaras de video la segunda
                    const allCams = devices.filter(d => d.kind === 'videoinput');
                    if (allCams.length >= 2) {
                        _mainCameraId = allCams[1].deviceId;
                        console.log('Cámara seleccionada (fallback):', allCams[1].label);
                    }
                }
            } catch(e) {
                console.warn('No se pudo detectar cámara principal:', e);
            }
        }

        // Interceptar getUserMedia para forzar la cámara correcta
        navigator.mediaDevices.getUserMedia = async function(constraints) {
            if (constraints && constraints.video && _mainCameraId) {
                // Forzar deviceId de la cámara del medio (1x)
                if (typeof constraints.video === 'object') {
                    constraints.video.deviceId = { exact: _mainCameraId };
                    // Quitar facingMode porque deviceId tiene prioridad
                    delete constraints.video.facingMode;
                } else {
                    constraints.video = { deviceId: { exact: _mainCameraId } };
                }
            }
            return _originalGetUserMedia(constraints);
        };

        // === State ===
        let musicPlaying = false;
        const landing = document.getElementById('landing');
        const scanning = document.getElementById('scanning');
        const musicBtn = document.getElementById('music-btn');
        const musicIco = document.getElementById('music-ico');
        const bgm = document.getElementById('bgm');
        const scene = document.querySelector('a-scene');
        const tracker = document.getElementById('ar-tracker');

        // === Particles (Mantener efecto en landing) ===
        (function() {
            const c = document.getElementById('particles');
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random()*100+'%';
                p.style.top = Math.random()*100+'%';
                p.style.animationDuration = (Math.random()*4+2)+'s';
                p.style.animationDelay = (Math.random()*3)+'s';
                p.style.width = p.style.height = (Math.random()*4+2)+'px';
                c.appendChild(p);
            }
        })();

        // === Start AR ===
        document.getElementById('btn-start').addEventListener('click', async function() {
            this.disabled = true;
            this.innerHTML = '<span>Detectando cámara 1x...</span>';
            try { bgm.load(); } catch(e) {}

            // Detectar cámara 1x Y activar giroscopio
            await detectMainCamera();
            await initGyroscope();
            this.innerHTML = '<span>Iniciando cámara...</span>';

            scene.addEventListener('arReady', () => {
                landing.classList.add('fade-out');
                setTimeout(() => { landing.classList.add('hidden'); scanning.classList.remove('hidden'); }, 600);
            });
            scene.addEventListener('arError', () => {
                this.disabled = false;
                this.innerHTML = '<span>Error. Intenta de nuevo</span>';
            });

            try {
                const sys = scene.systems['mindar-image-system'];
                await sys.start();
            } catch(e) {
                console.error('AR start failed:', e);
                this.disabled = false;
                this.innerHTML = '<span>Error: ' + e.message + '</span>';
            }
        });

        // === Target found/lost ===
        let _animationFired = false;
        tracker.addEventListener('targetFound', () => {
            scanning.classList.add('hidden');
            musicBtn.classList.remove('hidden');

            // Disparar animación cinematográfica de entrada (solo la primera vez)
            if (!_animationFired) {
                setTimeout(() => {
                    document.querySelectorAll('.ar-layer').forEach(el => {
                        el.emit('ar-pop');
                    });
                }, 300); // Esperar a que el tracker se estabilice
                _animationFired = true;
            }

            bgm.play().then(() => { musicPlaying = true; musicIco.textContent = '🎵'; }).catch(() => {});
        });

        tracker.addEventListener('targetLost', () => {
            scanning.classList.remove('hidden');
            bgm.pause(); musicPlaying = false; musicIco.textContent = '🔇';
        });

        // === Music toggle ===
        musicBtn.addEventListener('click', e => {
            e.stopPropagation();
            if (musicPlaying) { bgm.pause(); musicPlaying = false; musicIco.textContent = '🔇'; }
            else { bgm.play().then(() => { musicPlaying = true; musicIco.textContent = '🎵'; }).catch(() => {}); }
        });
    </script>
</body>
</html>
