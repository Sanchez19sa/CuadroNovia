<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Para Ti Mi Amor</title>
    <meta name="description" content="Una experiencia mágica de realidad aumentada creada con amor">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="./lib/mindar-image-aframe.prod.js"></script>

    <style>
        /* ============================================================
           DESIGN SYSTEM — "Cielo de Rosas"
           Premium Romantic Rose-Pink Aesthetic
           ============================================================ */

        /* --- Design Tokens --- */
        :root {
            --bg-deep: #2a0a18;
            --bg-mid: #3d1228;
            --bg-rose: #5c1a3a;
            --pink-100: #fce4ec;
            --pink-200: #f8bbd0;
            --pink-300: #f4b5c5;
            --pink-400: #e8899e;
            --pink-500: #d4637b;
            --pink-600: #c0465e;
            --pink-700: #a82850;
            --rose-gold: #c9a96e;
            --rose-gold-soft: rgba(201, 169, 110, 0.25);
            --ivory: #fff5f0;
            --pearl: #fff5f8;
            --champagne: #f5e6d8;
            --font-display: 'Playfair Display', serif;
            --font-script: 'Great Vibes', cursive;
            --font-body: 'Cormorant Garamond', serif;
        }

        /* --- Reset --- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .hidden {
            display: none !important;
        }

        /* ============================================================
           LANDING SCREEN — "Cielo de Rosas"
           ============================================================ */
        #landing {
            position: fixed;
            inset: 0;
            z-index: 100;
            background:
                radial-gradient(ellipse at 50% 20%, rgba(92, 26, 58, 0.95) 0%, transparent 65%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 40, 80, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(212, 99, 123, 0.1) 0%, transparent 50%),
                linear-gradient(175deg, var(--bg-rose) 0%, var(--bg-mid) 40%, var(--bg-deep) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            overflow: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #landing.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* --- Atmospheric Vignette --- */
        #landing::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(20, 4, 12, 0.4) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- Background Luminous Fog --- */
        .ambient-fog {
            position: absolute;
            inset: -60px;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .fog-layer {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: fog-drift 18s ease-in-out infinite alternate;
        }

        .fog-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(232, 137, 158, 0.18) 0%, transparent 70%);
            top: 5%;
            left: -10%;
            animation-duration: 20s;
        }

        .fog-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 99, 123, 0.12) 0%, transparent 70%);
            bottom: 5%;
            right: -8%;
            animation-duration: 25s;
            animation-delay: -8s;
        }

        .fog-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(244, 181, 197, 0.14) 0%, transparent 70%);
            top: 50%;
            left: 40%;
            animation-duration: 22s;
            animation-delay: -4s;
        }

        @keyframes fog-drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, -20px) scale(1.15);
            }
        }

        /* --- Floating Hearts (Multi-depth, premium) --- */
        .hearts-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            opacity: 0;
            animation: heart-rise linear infinite;
        }

        .heart-float svg {
            display: block;
        }

        @keyframes heart-rise {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.3);
                opacity: 0;
            }

            8% {
                opacity: var(--heart-opacity, 0.15);
            }

            70% {
                opacity: var(--heart-opacity, 0.15);
            }

            100% {
                transform: translateY(-120px) translateX(var(--heart-drift, 30px)) rotate(var(--heart-rot, 25deg)) scale(1);
                opacity: 0;
            }
        }

        /* --- Fairy Dust Particles --- */
        .fairy-dust {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .dust {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--pearl) 0%, transparent 70%);
            animation: dust-float ease-in-out infinite;
        }

        @keyframes dust-float {

            0%,
            100% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: var(--dust-opacity, 0.6);
                transform: translateY(-10px) scale(1);
            }

            80% {
                opacity: var(--dust-opacity, 0.4);
                transform: translateY(-40px) scale(0.8);
            }
        }

        /* --- Petal Rain --- */
        .petal-rain {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -40px;
            width: 12px;
            height: 16px;
            background: var(--pink-300);
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
            opacity: 0;
            animation: petal-fall linear infinite;
        }

        @keyframes petal-fall {
            0% {
                transform: translateY(-20px) rotate(45deg) rotateZ(0deg);
                opacity: 0;
            }

            10% {
                opacity: var(--petal-opacity, 0.18);
            }

            90% {
                opacity: var(--petal-opacity, 0.12);
            }

            100% {
                transform: translateY(110vh) rotate(405deg) rotateZ(180deg);
                opacity: 0;
            }
        }

        /* --- Main Content --- */
        .landing-content {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Ornamental Filigrana (top) --- */
        .filigree {
            width: 120px;
            height: 2px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, transparent, var(--rose-gold), transparent);
            position: relative;
            opacity: 0;
            animation: reveal-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .filigree::before,
        .filigree::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--rose-gold);
            font-size: 0.5rem;
            opacity: 0.6;
        }

        .filigree::before {
            left: -12px;
        }

        .filigree::after {
            right: -12px;
        }

        /* --- Title --- */
        .landing-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 500;
            font-style: italic;
            color: var(--pink-100);
            letter-spacing: 0.03em;
            line-height: 1.3;
            margin-bottom: 6px;
            text-shadow: 0 0 40px rgba(232, 137, 158, 0.3);
            opacity: 0;
            animation: reveal-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        .landing-script {
            font-family: var(--font-script);
            font-size: 2.8rem;
            font-weight: 400;
            color: var(--pink-300);
            margin-bottom: 28px;
            text-shadow: 0 0 50px rgba(244, 181, 197, 0.25);
            opacity: 0;
            animation: reveal-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        /* --- Collage Frame (Glassmorphism + Halo) --- */
        .collage-link {
            display: inline-block;
            text-decoration: none;
            margin-bottom: 10px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            opacity: 0;
            animation: reveal-scale 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        /* Luminous halo behind the frame */
        .collage-link::before {
            content: '';
            position: absolute;
            inset: -18px;
            border-radius: 20px;
            background: radial-gradient(ellipse at center,
                    rgba(232, 137, 158, 0.18) 0%,
                    rgba(244, 181, 197, 0.08) 40%,
                    transparent 70%);
            filter: blur(12px);
            animation: halo-pulse 4s ease-in-out infinite;
            z-index: -1;
        }

        .collage-preview {
            width: 240px;
            height: 240px;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid rgba(201, 169, 110, 0.25);
            box-shadow:
                0 0 0 1px rgba(255, 245, 240, 0.06),
                0 8px 32px rgba(26, 5, 16, 0.5),
                0 0 60px rgba(232, 137, 158, 0.1);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(61, 16, 40, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .collage-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .collage-link:hover .collage-preview,
        .collage-link:active .collage-preview {
            transform: scale(1.03) translateY(-4px);
            box-shadow:
                0 0 0 1px rgba(255, 245, 240, 0.1),
                0 20px 50px rgba(26, 5, 16, 0.5),
                0 0 80px rgba(232, 137, 158, 0.2);
        }

        .collage-link:hover .collage-preview img {
            transform: scale(1.04);
        }

        @keyframes halo-pulse {

            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.04);
            }
        }

        .collage-hint {
            font-family: var(--font-body);
            color: rgba(244, 181, 197, 0.4);
            font-size: 0.82rem;
            font-style: italic;
            font-weight: 300;
            margin-bottom: 32px;
            letter-spacing: 0.02em;
            opacity: 0;
            animation: reveal-up 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        }

        /* --- CTA Button (Shine sweep) --- */
        .btn-ar {
            position: relative;
            background: linear-gradient(135deg, var(--pink-500) 0%, var(--pink-700) 100%);
            color: var(--ivory);
            border: 1px solid rgba(201, 169, 110, 0.2);
            padding: 16px 42px;
            border-radius: 50px;
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow:
                0 4px 20px rgba(155, 27, 61, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            opacity: 0;
            animation: reveal-up 1s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
        }

        .btn-ar:hover {
            transform: translateY(-3px);
            box-shadow:
                0 8px 30px rgba(155, 27, 61, 0.4),
                0 0 40px rgba(232, 137, 158, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .btn-ar:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn-ar:disabled {
            opacity: 0.6;
            cursor: wait;
            transform: none;
        }

        /* Shine sweep effect */
        .btn-ar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            transform: skewX(-20deg);
            animation: shine-sweep 4s ease-in-out infinite;
        }

        @keyframes shine-sweep {

            0%,
            100% {
                left: -100%;
            }

            50% {
                left: 150%;
            }
        }

        .btn-ar .btn-icon {
            font-size: 1.2rem;
            animation: gentle-pulse 3s ease-in-out infinite;
        }

        @keyframes gentle-pulse {

            0%,
            100% {
                opacity: 0.8;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        /* --- Bottom Filigrana --- */
        .filigree-bottom {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.3), transparent);
            margin-top: 28px;
            opacity: 0;
            animation: reveal-up 1s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
        }

        /* --- Reveal Animations --- */
        @keyframes reveal-up {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes reveal-scale {
            from {
                opacity: 0;
                transform: scale(0.88) translateY(16px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ============================================================
           SCANNING OVERLAY
           ============================================================ */
        #scanning {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 220px;
            height: 220px;
            position: relative;
            margin-bottom: 28px;
        }

        .sc {
            position: absolute;
            width: 36px;
            height: 36px;
            border-color: var(--pink-400);
            border-style: solid;
            border-width: 0;
            animation: pulse-c 2s ease-in-out infinite;
        }

        .sc.tl {
            top: 0;
            left: 0;
            border-top-width: 2px;
            border-left-width: 2px;
            border-radius: 4px 0 0 0;
        }

        .sc.tr {
            top: 0;
            right: 0;
            border-top-width: 2px;
            border-right-width: 2px;
            border-radius: 0 4px 0 0;
        }

        .sc.bl {
            bottom: 0;
            left: 0;
            border-bottom-width: 2px;
            border-left-width: 2px;
            border-radius: 0 0 0 4px;
        }

        .sc.br {
            bottom: 0;
            right: 0;
            border-bottom-width: 2px;
            border-right-width: 2px;
            border-radius: 0 0 4px 0;
        }

        @keyframes pulse-c {

            0%,
            100% {
                opacity: 0.3;
                border-color: rgba(232, 137, 158, 0.3);
            }

            50% {
                opacity: 1;
                border-color: var(--pink-400);
            }
        }

        .scan-label {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(26, 5, 16, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(232, 137, 158, 0.1);
            padding: 12px 24px;
            border-radius: 50px;
            color: var(--pink-100);
            font-family: var(--font-body);
            font-size: 0.92rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            animation: fadeUp 0.6s ease;
        }

        .scan-label .cam-ico {
            animation: bob 2.5s ease-in-out infinite;
            font-size: 1.1rem;
        }

        @keyframes bob {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           MUSIC BUTTON
           ============================================================ */
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(201, 169, 110, 0.15);
            background: rgba(26, 5, 16, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--pink-200);
            font-size: 1.2rem;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(10, 2, 6, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(10, 2, 6, 0.5);
        }

        /* ============================================================
           A-FRAME OVERRIDES
           ============================================================ */
        .a-enter-vr {
            display: none !important;
        }

        a-scene {
            position: fixed !important;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-height: 700px) {
            .landing-title {
                font-size: 1.3rem;
            }

            .landing-script {
                font-size: 2.2rem;
                margin-bottom: 20px;
            }

            .collage-preview {
                width: 190px;
                height: 190px;
            }

            .collage-hint {
                margin-bottom: 20px;
            }

            .btn-ar {
                padding: 14px 36px;
                font-size: 1rem;
            }

            .filigree {
                margin-bottom: 14px;
            }
        }

        @media (min-width: 768px) {
            .landing-title {
                font-size: 2rem;
            }

            .landing-script {
                font-size: 3.4rem;
            }

            .collage-preview {
                width: 280px;
                height: 280px;
            }
        }

        /* ============================================================
           ENHANCED ROMANTIC ELEMENTS — Level 2
           ============================================================ */

        /* --- Star Field (Background constellation) --- */
        .star-field {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: var(--pearl);
            animation: star-twinkle ease-in-out infinite;
        }
        @keyframes star-twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: var(--star-max, 0.6); transform: scale(1.2); }
        }

        /* --- Shimmer Sparkles (larger, brighter fairy lights) --- */
        .sparkle-layer {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
        }
        .sparkle::before, .sparkle::after {
            content: '';
            position: absolute;
            background: var(--pearl);
            border-radius: 1px;
        }
        .sparkle::before {
            width: 100%;
            height: 2px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
        .sparkle::after {
            width: 2px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .sparkle {
            animation: sparkle-burst ease-in-out infinite;
        }
        @keyframes sparkle-burst {
            0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
            20% { opacity: var(--sparkle-max, 0.8); transform: scale(1) rotate(15deg); }
            40% { opacity: var(--sparkle-max, 0.8); transform: scale(1.1) rotate(30deg); }
            60% { opacity: 0.2; transform: scale(0.6) rotate(45deg); }
        }



        /* --- Corner Ornaments (Filigree decorations) --- */
        .corner-ornament {
            position: absolute;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: reveal-up 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
        }
        .corner-ornament svg {
            display: block;
        }
        .corner-tl { top: 16px; left: 16px; }
        .corner-tr { top: 16px; right: 16px; transform: scaleX(-1); }
        .corner-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
        .corner-br { bottom: 16px; right: 16px; transform: scale(-1, -1); }

        /* --- Constellation Lines --- */
        .constellation-layer {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .constellation-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 245, 248, 0.08), transparent);
            transform-origin: left center;
            animation: constellation-fade 8s ease-in-out infinite;
        }
        @keyframes constellation-fade {
            0%, 100% { opacity: 0; }
            40%, 60% { opacity: 1; }
        }

        /* --- Radial Light Burst (behind collage) --- */
        .light-burst {
            position: absolute;
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(circle,
                rgba(232, 137, 158, 0.08) 0%,
                rgba(244, 181, 197, 0.04) 30%,
                transparent 60%);
            animation: burst-breathe 6s ease-in-out infinite;
        }
        @keyframes burst-breathe {
            0%, 100% { transform: translate(-50%, -55%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -55%) scale(1.15); opacity: 1; }
        }

        /* --- Decorative Collage Frame Ornaments --- */
        .collage-frame-deco {

    <!-- ====== ESTABILIZADOR AR v5 — SENSOR FUSION (Giroscopio + Tracking) ====== -->
    <!-- Usa el giroscopio del celular para saber si el dispositivo está REALMENTE quieto -->
    <!-- Si el giroscopio dice "quieto" pero MindAR mueve → es RUIDO, se ignora casi todo -->
    <script>
        // === SENSOR FUSION: Detectar movimiento REAL con giroscopio ===
        // Funciona en: Samsung S21 FE (Android), iPhone 12 Pro Max (iOS), cualquier smartphone
        window._gyroSpeed = 0;
        window._gyroAvailable = false;
        let _prevGyroA = null, _prevGyroB = null, _prevGyroG = null;

        function handleOrientation(e) {
            window._gyroAvailable = true;
            if (_prevGyroA !== null) {
                const da = Math.abs(e.alpha - _prevGyroA);
                const db = Math.abs(e.beta - _prevGyroB);
                const dg = Math.abs(e.gamma - _prevGyroG);
                const speed = Math.min(da, 360 - da) + db + dg;

                // FAST ATTACK / SLOW RELEASE
                // Si haces un movimiento brusco, reacciona en 0 milisegundos (CERO LAG).
                // Si te quedas quieto, los temblores caen suavemente hasta congelarse.
                if (speed > window._gyroSpeed) {
                    window._gyroSpeed = speed;
                } else {
                    window._gyroSpeed = window._gyroSpeed * 0.85 + speed * 0.15;
                }
            }
            _prevGyroA = e.alpha;
            _prevGyroB = e.beta;
            _prevGyroG = e.gamma;
        }

        // Inicializar giroscopio (con permiso de iOS si es necesario)
        async function initGyroscope() {
            try {
                // iOS 13+ requiere permiso explícito para DeviceOrientation
                if (typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        console.log('Giroscopio iOS activado ✅');
                    } else {
                        console.warn('Permiso de giroscopio denegado en iOS');
                    }
                } else {
                    // Android y otros: no necesita permiso
                    window.addEventListener('deviceorientation', handleOrientation);
                    console.log('Giroscopio activado ✅');
                }
            } catch (e) {
                console.warn('Giroscopio no disponible:', e);
            }
        }

        // === COMPONENTE SMOOTH-FOLLOW CON SENSOR FUSION (TOTAL FREEZE) ===
        AFRAME.registerComponent('smooth-follow', {
            schema: {
                target: { type: 'selector' },
                // Alpha cuando giroscopio confirma quietud: 0.0 significa CONGELADO TOTAL
                gyroStillAlpha: { type: 'number', default: 0.0 },
                // Alpha mínimo sin giroscopio
                minAlpha: { type: 'number', default: 0.01 },
                // Alpha máximo en movimiento rápido (1.0 = seguimiento inmediato)
                maxAlpha: { type: 'number', default: 1.0 },
                // Sensibilidad a velocidad
                speedSensitivity: { type: 'number', default: 60 },
                // Umbral donde se considera TOTALMENTE QUIETO el celular
                gyroStillThreshold: { type: 'number', default: 0.10 },
                // Umbral donde empieza a moverse intencionalmente
                gyroMoveThreshold: { type: 'number', default: 0.25 },
                // Factor de amortiguación de rotación (mayor = tracking más rápido)
                rotDamping: { type: 'number', default: 0.3 },
                // Factor de amortiguación de escala (mayor = tracking más rápido en Z)
                scaleDamping: { type: 'number', default: 0.15 }
            },
            init: function () {
                // Estado suavizado
                this._pos = new THREE.Vector3();
                this._quat = new THREE.Quaternion();
                this._scale = new THREE.Vector3(1, 1, 1);
                this._prevPos = new THREE.Vector3();
                // Pre-alocar vectores
                this._tmpP = new THREE.Vector3();
                this._tmpQ = new THREE.Quaternion();
                this._tmpS = new THREE.Vector3();
                this._fastSpeed = 0;
                this._ready = false;
                this._visible = false;
            },
            tick: function (time, delta) {
                const tracker = this.data.target;
                if (!tracker) return;
                const obj3d = tracker.object3D;

                // TARGET LOST
                if (!obj3d.visible) {
                    if (this._visible) {
                        this.el.object3D.visible = false;
                        this._visible = false;
                        this._ready = false;
                        this._fastSpeed = 0;
                    }
                    return;
                }

                // Leer posición del tracker
                const p = this._tmpP;
                const q = this._tmpQ;
                const s = this._tmpS;
                obj3d.updateWorldMatrix(true, false);
                obj3d.matrixWorld.decompose(p, q, s);

                const self = this.el.object3D;

                // Primera detección: snap directo
                if (!this._ready) {
                    this._pos.copy(p);
                    this._quat.copy(q);
                    this._scale.copy(s);
                    this._prevPos.copy(p);
                    self.position.copy(this._pos);
                    self.quaternion.copy(this._quat);
                    self.scale.copy(this._scale);
                    self.visible = true;
                    this._visible = true;
                    this._ready = true;
                    return;
                }

                // === MICRO-JITTER LOCK (ANTI-TEMBLOR EXTREMO EN MACRO) ===
                // Cuando te acercas mucho al cuadro, un error de cámara de 1mm se magnifica en las capas flotantes.
                // Hysteresis: Si tu mano está firme (gyro < 0.3) y la cámara reporta un movimiento de "ruido" minúsculo,
                // MATA el ruido obligando a la lectura a ser idéntica al cuadro anterior. Congelado absoluto.
                if (window._gyroAvailable && window._gyroSpeed < 0.2) {
                    if (p.distanceTo(this._pos) < 0.02 &&
                        q.angleTo(this._quat) < 0.06 &&
                        s.distanceTo(this._scale) < 0.06) {
                        p.copy(this._pos);
                        q.copy(this._quat);
                        s.copy(this._scale);
                    }
                }

                // Velocidad del tracking
                const speed = p.distanceTo(this._prevPos);
                this._prevPos.copy(p);

                // FAST ATTACK / SLOW RELEASE para el tracker
                if (speed > this._fastSpeed) {
                    this._fastSpeed = speed; // Cero lag al atrapar el movimiento nuevo
                } else {
                    this._fastSpeed = this._fastSpeed * 0.7 + speed * 0.3;
                }
                const avgSpeed = this._fastSpeed;

                // === SENSOR FUSION: Control TOTAL de quietud ===
                let gyroFactor = 1.0;
                if (window._gyroAvailable) {
                    if (window._gyroSpeed <= this.data.gyroStillThreshold) {
                        // CELULAR FÍSICAMENTE QUIETO = TODO RUIDO ES FALSO
                        gyroFactor = 0.0;
                    } else if (window._gyroSpeed >= this.data.gyroMoveThreshold) {
                        // CELULAR MOVIÉNDOSE = CONFIAR EN TRACKER
                        gyroFactor = 1.0;
                    } else {
                        // TRANSICIÓN SUAVE (evita saltos al empezar a mover)
                        gyroFactor = (window._gyroSpeed - this.data.gyroStillThreshold) /
                            (this.data.gyroMoveThreshold - this.data.gyroStillThreshold);
                    }
                }

                // Si gyroFactor === 0, currentMinAlpha = 0.0 (CONGELADO TOTAL)
                const currentMinAlpha = gyroFactor === 0.0 ? this.data.gyroStillAlpha : this.data.minAlpha;

                // El ruido del tracker se ignora si gyroFactor es bajo
                const dynamicSpeed = avgSpeed * gyroFactor;

                // Alpha adaptativo
                const rawAlpha = currentMinAlpha +
                    Math.min(dynamicSpeed * this.data.speedSensitivity, this.data.maxAlpha - currentMinAlpha);

                // Frame-rate independiente
                const dt = Math.min(delta || 16.67, 50) / 1000;
                const alpha = 1 - Math.pow(1 - rawAlpha, dt * 60);

                // === ELIMINACIÓN DE TEMBLOR EN CAPAS Z ===
                // La escala controla el tamaño = distancia percibida (la super suavizamos)
                const scaleAlpha = alpha * this.data.scaleDamping;
                // La rotación amplifica las capas en Z como un péndulo (la suavizamos x6)
                const rotAlpha = alpha * this.data.rotDamping;

                // Interpolar (si alpha=0, NO HACE NADA, queda ESTATICO MATEMATICAMENTE)
                this._pos.lerp(p, alpha);
                this._quat.slerp(q, rotAlpha);
                this._scale.lerp(s, scaleAlpha);

                // Aplicar
                self.position.copy(this._pos);
                self.quaternion.copy(this._quat);
                self.scale.copy(this._scale);

                if (!this._visible) {
                    self.visible = true;
                    this._visible = true;
                }
            }
        });
    </script>

    <script>
        // === Forzar cámara principal 1x (la del medio) en Samsung S21 FE ===
        let _mainCameraId = null;
        const _originalGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);

        async function detectMainCamera() {
            try {
                const tempStream = await _originalGetUserMedia({ video: { facingMode: 'environment' } });
                tempStream.getTracks().forEach(t => t.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                const rearCams = devices.filter(d =>
                    d.kind === 'videoinput' &&
                    !d.label.toLowerCase().includes('front') &&
                    (d.label.toLowerCase().includes('back') ||
                        d.label.toLowerCase().includes('rear') ||
                        d.label.toLowerCase().includes('trasera') ||
                        d.label.toLowerCase().includes('environment') ||
                        /\d/.test(d.label))
                );
                console.log('Cámaras traseras detectadas:', rearCams.map(c => c.label));
                if (rearCams.length >= 2) {
                    _mainCameraId = rearCams[1].deviceId;
                    console.log('Cámara 1x seleccionada:', rearCams[1].label);
                } else {
                    const allCams = devices.filter(d => d.kind === 'videoinput');
                    if (allCams.length >= 2) {
                        _mainCameraId = allCams[1].deviceId;
                        console.log('Cámara seleccionada (fallback):', allCams[1].label);
                    }
                }
            } catch (e) {
                console.warn('No se pudo detectar cámara principal:', e);
            }
        }

        navigator.mediaDevices.getUserMedia = async function (constraints) {
            if (constraints && constraints.video && _mainCameraId) {
                if (typeof constraints.video === 'object') {
                    constraints.video.deviceId = { exact: _mainCameraId };
                    delete constraints.video.facingMode;
                } else {
                    constraints.video = { deviceId: { exact: _mainCameraId } };
                }
            }
            return _originalGetUserMedia(constraints);
        };

        // ============================================================
        // LANDING VISUAL EFFECTS ENGINE
        // ============================================================

        // --- Floating Hearts (SVG, multi-depth) ---
        (function generateHearts() {
            const container = document.getElementById('hearts-layer');
            const heartSVG = (color, opacity) => `
                <svg viewBox="0 0 24 24" fill="${color}" opacity="${opacity}">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 
                    2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 
                    14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 
                    11.54L12 21.35z"/>
                </svg>`;
            const configs = [
                // Large foreground hearts (clearly visible)
                { size: 28, color: 'rgba(232,137,158,0.85)', opacity: 0.4, dur: 13, drift: 45, rot: 25, blur: 0 },
                { size: 22, color: 'rgba(244,181,197,0.8)', opacity: 0.35, dur: 16, drift: -35, rot: -20, blur: 0 },
                { size: 32, color: 'rgba(212,99,123,0.7)', opacity: 0.3, dur: 20, drift: 55, rot: 15, blur: 0 },
                { size: 18, color: 'rgba(248,187,208,0.9)', opacity: 0.45, dur: 11, drift: -25, rot: 35, blur: 0 },
                { size: 25, color: 'rgba(232,137,158,0.75)', opacity: 0.35, dur: 18, drift: 40, rot: -30, blur: 0 },
                { size: 15, color: 'rgba(244,181,197,0.85)', opacity: 0.4, dur: 14, drift: -50, rot: 40, blur: 0 },
                // Medium mid-depth hearts
                { size: 20, color: 'rgba(201,169,110,0.6)', opacity: 0.25, dur: 19, drift: 30, rot: -15, blur: 0 },
                { size: 16, color: 'rgba(232,137,158,0.7)', opacity: 0.3, dur: 22, drift: -40, rot: 20, blur: 0 },
                { size: 24, color: 'rgba(248,187,208,0.65)', opacity: 0.28, dur: 17, drift: 35, rot: -25, blur: 0 },
                { size: 14, color: 'rgba(212,99,123,0.75)', opacity: 0.35, dur: 15, drift: -30, rot: 30, blur: 0 },
                { size: 19, color: 'rgba(244,181,197,0.7)', opacity: 0.3, dur: 21, drift: 45, rot: -35, blur: 0 },
                { size: 12, color: 'rgba(232,137,158,0.8)', opacity: 0.38, dur: 12, drift: -20, rot: 15, blur: 0 },
                // Small background hearts (softer, some with blur for depth)
                { size: 10, color: 'rgba(244,181,197,0.5)', opacity: 0.2, dur: 24, drift: 25, rot: -10, blur: 1 },
                { size: 8, color: 'rgba(201,169,110,0.45)', opacity: 0.18, dur: 26, drift: -35, rot: 25, blur: 1 },
                { size: 13, color: 'rgba(232,137,158,0.4)', opacity: 0.15, dur: 28, drift: 20, rot: -20, blur: 2 },
                { size: 9, color: 'rgba(255,245,240,0.5)', opacity: 0.2, dur: 23, drift: -15, rot: 30, blur: 1 },
                { size: 11, color: 'rgba(212,99,123,0.45)', opacity: 0.18, dur: 25, drift: 30, rot: -25, blur: 1 },
                { size: 7, color: 'rgba(244,181,197,0.4)', opacity: 0.15, dur: 27, drift: -25, rot: 20, blur: 2 },
            ];
            configs.forEach((c, i) => {
                const el = document.createElement('div');
                el.className = 'heart-float';
                el.innerHTML = heartSVG(c.color, 1);
                el.style.cssText = `
                    left: ${5 + Math.random() * 90}%;
                    width: ${c.size}px; height: ${c.size}px;
                    --heart-opacity: ${c.opacity};
                    --heart-drift: ${c.drift}px;
                    --heart-rot: ${c.rot}deg;
                    animation-duration: ${c.dur}s;
                    animation-delay: ${-Math.random() * c.dur}s;
                    filter: blur(${c.blur}px);
                `;
                container.appendChild(el);
            });
        })();

        // --- Fairy Dust ---
        (function generateDust() {
            const container = document.getElementById('fairy-dust');
            for (let i = 0; i < 30; i++) {
                const d = document.createElement('div');
                d.className = 'dust';
                const size = 2 + Math.random() * 3;
                d.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${size}px; height: ${size}px;
                    --dust-opacity: ${0.2 + Math.random() * 0.4};
                    animation-duration: ${3 + Math.random() * 5}s;
                    animation-delay: ${-Math.random() * 6}s;
                `;
                container.appendChild(d);
            }
        })();

        // --- Petal Rain ---
        (function generatePetals() {
            const container = document.getElementById('petal-rain');
            const colors = ['#f4b5c5', '#e8899e', '#f8bbd0', '#fce4ec', '#d4637b'];
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                const size = 8 + Math.random() * 10;
                p.style.cssText = `
                    left: ${Math.random() * 100}%;
                    width: ${size}px; height: ${size * 1.3}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --petal-opacity: ${0.08 + Math.random() * 0.14};
                    animation-duration: ${10 + Math.random() * 12}s;
                    animation-delay: ${-Math.random() * 16}s;
                    filter: blur(${Math.random() > 0.5 ? 1 : 0}px);
                `;
                container.appendChild(p);
            }
        })();

        // --- Star Field ---
        (function generateStars() {
            const container = document.getElementById('star-field');
            for (let i = 0; i < 40; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = 1 + Math.random() * 2.5;
                s.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${size}px; height: ${size}px;
                    --star-max: ${0.3 + Math.random() * 0.5};
                    animation-duration: ${2 + Math.random() * 6}s;
                    animation-delay: ${-Math.random() * 8}s;
                `;
                container.appendChild(s);
            }
        })();

        // --- Shimmer Sparkles (cross-shaped) ---
        (function generateSparkles() {
            const container = document.getElementById('sparkle-layer');
            for (let i = 0; i < 20; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                const size = 3 + Math.random() * 5;
                s.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${size}px; height: ${size}px;
                    --sparkle-max: ${0.4 + Math.random() * 0.5};
                    animation-duration: ${2 + Math.random() * 4}s;
                    animation-delay: ${-Math.random() * 6}s;
                `;
                container.appendChild(s);
            }
        })();


        // --- Cupid Silhouettes (removed per user request) ---

        // --- Constellation Lines ---
        (function generateConstellations() {
            const container = document.getElementById('constellation-layer');
            const lines = [
                { x: '12%', y: '15%', w: 80, angle: 25, delay: 0 },
                { x: '70%', y: '10%', w: 60, angle: -15, delay: -3 },
                { x: '5%', y: '55%', w: 90, angle: 10, delay: -2 },
                { x: '80%', y: '50%', w: 50, angle: -30, delay: -5 },
                { x: '25%', y: '80%', w: 70, angle: -5, delay: -1 },
                { x: '60%', y: '75%', w: 55, angle: 20, delay: -4 },
                { x: '40%', y: '20%', w: 45, angle: -20, delay: -6 },
                { x: '85%', y: '35%', w: 65, angle: 8, delay: -7 },
            ];
            lines.forEach(l => {
                const el = document.createElement('div');
                el.className = 'constellation-line';
                el.style.cssText = `
                    left: ${l.x}; top: ${l.y};
                    width: ${l.w}px;
                    transform: rotate(${l.angle}deg);
                    animation-delay: ${l.delay}s;
                    animation-duration: ${6 + Math.random() * 6}s;
                `;
                container.appendChild(el);
            });
        })();

        // ============================================================
        // APP LOGIC (preserved from original)
        // ============================================================

        let musicPlaying = false;
        const landing = document.getElementById('landing');
        const scanning = document.getElementById('scanning');
        const musicBtn = document.getElementById('music-btn');
        const musicIco = document.getElementById('music-ico');
        const bgm = document.getElementById('bgm');
        const scene = document.querySelector('a-scene');
        const tracker = document.getElementById('ar-tracker');

        // === Start AR ===
        document.getElementById('btn-start').addEventListener('click', async function () {
            this.disabled = true;
            this.querySelector('span:first-child').textContent = 'Preparando...';
            try { bgm.load(); } catch (e) { }

            await detectMainCamera();
            await initGyroscope();
            this.querySelector('span:first-child').textContent = 'Iniciando...';

            scene.addEventListener('arReady', () => {
                landing.classList.add('fade-out');
                setTimeout(() => { landing.classList.add('hidden'); scanning.classList.remove('hidden'); }, 800);
            });
            scene.addEventListener('arError', () => {
                this.disabled = false;
                this.querySelector('span:first-child').textContent = 'Reintentar';
            });

            try {
                const sys = scene.systems['mindar-image-system'];
                await sys.start();
            } catch (e) {
                console.error('AR start failed:', e);
                this.disabled = false;
                this.querySelector('span:first-child').textContent = 'Error. Intenta de nuevo';
            }
        });

        // === Target found/lost ===
        let _animationFired = false;
        tracker.addEventListener('targetFound', () => {
            scanning.classList.add('hidden');
            musicBtn.classList.remove('hidden');
            if (!_animationFired) {
                setTimeout(() => {
                    document.querySelectorAll('.ar-layer').forEach(el => { el.emit('ar-pop'); });
                }, 300);
                _animationFired = true;
            }
            bgm.play().then(() => { musicPlaying = true; musicIco.textContent = '♫'; }).catch(() => { });
        });

        tracker.addEventListener('targetLost', () => {
            scanning.classList.remove('hidden');
            bgm.pause(); musicPlaying = false; musicIco.textContent = '✕';
        });

        // === Music toggle ===
        musicBtn.addEventListener('click', e => {
            e.stopPropagation();
            if (musicPlaying) { bgm.pause(); musicPlaying = false; musicIco.textContent = '✕'; }
            else { bgm.play().then(() => { musicPlaying = true; musicIco.textContent = '♫'; }).catch(() => { }); }
        });
    </script>
</body>
