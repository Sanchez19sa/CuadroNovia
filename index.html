<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>💕 Para Ti Mi Amor</title>
    <meta name="description" content="Una experiencia mágica de realidad aumentada creada con amor">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="./lib/mindar-image-aframe.prod.js"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .hidden { display: none !important; }

        /* ======== LANDING SCREEN ======== */
        #landing {
            position: fixed; inset: 0; z-index: 100;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 40%, #0f3460 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
            transition: opacity 0.6s ease;
        }
        #landing.fade-out { opacity: 0; pointer-events: none; }

        .landing-particles { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
        .particle {
            position: absolute; background: rgba(192, 132, 252, 0.25); border-radius: 50%;
            animation: float-p 6s ease-in-out infinite;
        }
        @keyframes float-p {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
            25% { opacity: 0.6; } 50% { transform: translateY(-40px) scale(1.5); opacity: 0.3; } 75% { opacity: 0.15; }
        }

        .landing-content { position: relative; z-index: 2; max-width: 420px; }

        .heart-beat { font-size: 3rem; display: inline-block; animation: hb 1.5s ease-in-out infinite; filter: drop-shadow(0 0 18px rgba(255,107,157,0.6)); margin-bottom: 12px; }
        @keyframes hb { 0%,100%{transform:scale(1)} 15%{transform:scale(1.25)} 30%{transform:scale(1)} 45%{transform:scale(1.15)} 60%{transform:scale(1)} }

        .landing-title {
            font-family: 'Great Vibes', cursive; font-size: 2.6rem; font-weight: 400;
            background: linear-gradient(135deg, #ff6b9d, #c084fc, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px;
        }
        .landing-sub { color: rgba(255,255,255,0.45); font-size: 0.88rem; font-weight: 300; margin-bottom: 24px; }

        /* Collage preview on landing */
        .collage-link { display: block; text-decoration: none; margin: 0 auto 8px; width: 260px; cursor: pointer; }
        .collage-preview {
            width: 260px; height: 260px; border-radius: 12px; overflow: hidden;
            border: 3px solid rgba(192,132,252,0.3);
            box-shadow: 0 0 40px rgba(192,132,252,0.15); transition: transform 0.3s, box-shadow 0.3s;
        }
        .collage-preview img { width: 100%; height: 100%; object-fit: cover; }
        .collage-link:hover .collage-preview { transform: scale(1.03); box-shadow: 0 0 50px rgba(192,132,252,0.3); }
        .collage-hint { color: rgba(255,255,255,0.35); font-size: 0.72rem; margin-bottom: 22px; }

        .btn-ar {
            background: linear-gradient(135deg, #ff6b9d, #c084fc); color: white; border: none;
            padding: 16px 36px; border-radius: 50px; font-family: 'Inter', sans-serif;
            font-size: 1.05rem; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 30px rgba(192,132,252,0.35); transition: all 0.3s ease;
        }
        .btn-ar:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(192,132,252,0.5); }
        .btn-ar:active { transform: translateY(-1px) scale(0.99); }
        .btn-ar:disabled { opacity: 0.7; cursor: wait; transform: none; }
        .btn-ar .sparkle { animation: tw 1.5s ease-in-out infinite; }
        @keyframes tw { 0%,100%{opacity:1;transform:scale(1)rotate(0)} 50%{opacity:0.6;transform:scale(1.2)rotate(20deg)} }

        .landing-hint { color: rgba(255,255,255,0.25); font-size: 0.72rem; margin-top: 14px; }

        /* ======== SCANNING OVERLAY ======== */
        #scanning {
            position: fixed; inset: 0; z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .scan-frame { width: 220px; height: 220px; position: relative; margin-bottom: 28px; }
        .sc { position: absolute; width: 36px; height: 36px; border-color: rgba(192,132,252,0.8); border-style: solid; border-width: 0; animation: pulse-c 2s ease-in-out infinite; }
        .sc.tl { top:0;left:0;border-top-width:3px;border-left-width:3px;border-radius:4px 0 0 0; }
        .sc.tr { top:0;right:0;border-top-width:3px;border-right-width:3px;border-radius:0 4px 0 0; }
        .sc.bl { bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 4px; }
        .sc.br { bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 4px 0; }
        @keyframes pulse-c { 0%,100%{opacity:0.4;border-color:rgba(192,132,252,0.4)} 50%{opacity:1;border-color:rgba(192,132,252,1)} }

        .scan-label {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 12px 22px; border-radius: 50px; color: rgba(255,255,255,0.9); font-size: 0.88rem;
            animation: fadeUp 0.6s ease;
        }
        .scan-label .cam-ico { animation: bob 2s ease-in-out infinite; }
        @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

        /* ======== DELETE EFFECTS OVERLAY ======== */
        /* CSS para los overrides base se mantiene */

        /* Music button */
        .music-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 30;
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: white; font-size: 1.3rem; cursor: pointer; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s;
        }
        .music-btn:hover { transform: scale(1.1); }

        /* A-Frame overrides */
        .a-enter-vr { display: none !important; }
        a-scene { position: fixed !important; top: 0; left: 0; z-index: 1; }

        /* Small screens */
        @media (max-height: 700px) {
            .fl-1,.fl-2,.fl-3,.fl-4 { width: 70px; height: 70px; }
            .fl-5,.fl-6,.fl-7,.fl-8 { width: 55px; height: 55px; }
            .fl-9,.fl-10,.fl-11,.fl-12 { width: 45px; height: 45px; }
            .love-text { font-size: 1.5rem; }
            .msg-wrap { bottom: 4%; }
            .landing-title { font-size: 2rem; }
            .collage-preview { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <!-- ====== LANDING ====== -->
    <div id="landing">
        <div class="landing-particles" id="particles"></div>
        <div class="landing-content">
            <div class="heart-beat">💕</div>
            <h1 class="landing-title">Para Ti Mi Amor</h1>
            <p class="landing-sub">Una experiencia mágica te espera</p>

            <a href="./assets/collage-cuadro.png" target="_blank" class="collage-link" title="Ver imagen completa">
                <div class="collage-preview">
                    <img src="./assets/collage-cuadro.png" alt="Nuestras fotos">
                </div>
            </a>
            <p class="collage-hint">Toca la imagen para verla completa 🔍</p>

            <button class="btn-ar" id="btn-start">
                <span>Activar Realidad Aumentada</span>
                <span class="sparkle">✨</span>
            </button>
            <p class="landing-hint">Se necesita acceso a la cámara</p>
        </div>
    </div>

    <!-- ====== SCANNING ====== -->
    <div id="scanning" class="hidden">
        <div class="scan-frame">
            <div class="sc tl"></div><div class="sc tr"></div>
            <div class="sc bl"></div><div class="sc br"></div>
        </div>
        <div class="scan-label">
            <span class="cam-ico">📸</span>
            <span>Apunta la cámara al cuadro</span>
        </div>
    </div>

    <!-- ====== MUSIC ====== -->
    <button class="music-btn hidden" id="music-btn" aria-label="Música">
        <span id="music-ico">🎵</span>
    </button>
    <audio id="bgm" loop preload="auto">
        <source src="./assets/musica.mp3" type="audio/mpeg">
    </audio>

    <!-- ====== AR SCENE (Parallax 3D Real) ====== -->
    <a-scene

        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <!-- Cargamos las 8 capas transparentes que generamos en Node.js -->

            <img id="layer2" src="./assets/layers/layer2_bg_flowers.png" crossorigin="anonymous">
            <img id="layer3" src="./assets/layers/layer3_cross_photos.png" crossorigin="anonymous">
            <img id="layer4" src="./assets/layers/layer4_cross_flowers.png" crossorigin="anonymous">
            <img id="layer5" src="./assets/layers/layer5_corner_photos.png" crossorigin="anonymous">
            <img id="layer6" src="./assets/layers/layer6_corner_flowers.png" crossorigin="anonymous">
            <img id="layer7" src="./assets/layers/layer7_center_photo.png" crossorigin="anonymous">
            <img id="layer8" src="./assets/layers/layer8_center_flowers.png" crossorigin="anonymous">

AAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIfBQf0A0CAAAECBAgQIECAAAECBIYvBAkQIECAAAECBAgQIAAAQIPAZZ2AA63M7zHMAAAAASUVORK5CYII=">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="ar-group">
            <!-- 
                Efecto Parallax Frontal (Pop-Out)
                Usamos distancias POSITIVAS en el eje Z para que al mover el celular
                las fotos orbiten visualmente sobre el papel en el mundo real.
            -->
            
            <a-image id="img-layer1" src="#layer1" position="0 0 0.01" width="1" height="1"></a-image>

            <a-image id="img-layer2" src="#layer2" position="0 0 0" width="1.2" height="1.2" 
                animation__pop="property: position; to: 0 0 0.05; dur: 2000; easing: easeOutElastic; startEvents: animate-pop"></a-image>

            <a-image id="img-layer3" src="#layer3" position="0 0 0" width="1" height="1"
                animation__pop="property: position; to: 0 0 0.12; dur: 1500; easing: easeOutElastic; startEvents: animate-pop"
                animation__rot="property: rotation; to: 0 0 2; dur: 1800; easing: easeOutQuad; startEvents: animate-pop"></a-image>

            <a-image id="img-layer4" src="#layer4" position="0 0 0" width="1" height="1"
                animation__pop="property: position; to: 0 0 0.16; dur: 1700; easing: easeOutElastic; startEvents: animate-pop"></a-image>

            <a-image id="img-layer5" src="#layer5" position="0 0 0" width="1" height="1"
                animation__pop="property: position; to: 0 0 0.22; dur: 1900; easing: easeOutElastic; startEvents: animate-pop"
                animation__rot="property: rotation; to: 0 0 -3; dur: 2000; easing: easeOutQuad; startEvents: animate-pop"></a-image>

            <a-image id="img-layer6" src="#layer6" position="0 0 0" width="1" height="1"
                animation__pop="property: position; to: 0 0 0.28; dur: 2100; easing: easeOutElastic; startEvents: animate-pop"></a-image>

            <a-image id="img-layer7" src="#layer7" position="0 0 0" width="1" height="1"
                animation__pop="property: position; to: 0 0 0.35; dur: 2300; easing: easeOutElastic; startEvents: animate-pop"
                animation__rot="property: rotation; to: 0 0 4; dur: 2200; easing: easeOutQuad; startEvents: animate-pop"></a-image>

            <a-image id="img-layer8" src="#layer8" position="0 0 0" width="1" height="1"
                animation__pop="property: position; to: 0 0 0.40; dur: 2500; easing: easeOutElastic; startEvents: animate-pop"></a-image>

            <!-- Texto 3D Te Amo -->

                text="value: Te amo mi vida; font: https://cdn.aframe.io/fonts/mozillavr.fnt; color: #ff6b9d; align: center; width: 1.5;"
                animation__pop="property: position; to: 0 -0.4 0.50; dur: 2800; easing: easeOutElastic; startEvents: animate-pop"
                animation__float="property: position; to: 0 -0.38 0.50; dur: 2000; easing: easeInOutSine; dir: alternate; loop: true; startEvents: animate-pop">

    <script>
        // === State ===
        let musicPlaying = false;
        const landing = document.getElementById('landing');
        const scanning = document.getElementById('scanning');
        const musicBtn = document.getElementById('music-btn');
        const musicIco = document.getElementById('music-ico');
        const bgm = document.getElementById('bgm');
        const scene = document.querySelector('a-scene');
        const target = document.querySelector('[mindar-image-target]');

        // === Particles (Mantener efecto en landing) ===
        (function() {
            const c = document.getElementById('particles');
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random()*100+'%';
                p.style.top = Math.random()*100+'%';
                p.style.animationDuration = (Math.random()*4+2)+'s';
                p.style.animationDelay = (Math.random()*3)+'s';
                p.style.width = p.style.height = (Math.random()*4+2)+'px';
                c.appendChild(p);
            }
        })();

        // === Start AR ===
        document.getElementById('btn-start').addEventListener('click', async function() {
            this.disabled = true;
            this.innerHTML = '<span>Iniciando cámara...</span>';
            try { bgm.load(); } catch(e) {}

            scene.addEventListener('arReady', () => {
                landing.classList.add('fade-out');
                setTimeout(() => { landing.classList.add('hidden'); scanning.classList.remove('hidden'); }, 600);
            });
            scene.addEventListener('arError', () => {
                this.disabled = false;
                this.innerHTML = '<span>Error. Intenta de nuevo</span>';
            });

            try {
                const sys = scene.systems['mindar-image-system'];
                await sys.start();
            } catch(e) {
                console.error('AR start failed:', e);
                this.disabled = false;
                this.innerHTML = '<span>Error: ' + e.message + '</span>';
            }
        });

        // === Target found/lost ===
        target.addEventListener('targetFound', () => {
            scanning.classList.add('hidden');
            musicBtn.classList.remove('hidden');
            
            // Disparar las animaciones 3D de las capas en A-Frame
            const entities = document.querySelectorAll('[animation__pop]');
            entities.forEach(el => {
                // Reiniciar a 0
                el.setAttribute('position', '0 0 0');
                el.setAttribute('rotation', '0 0 0');
                el.emit('animate-pop');
            });

            bgm.play().then(() => { musicPlaying = true; musicIco.textContent = '🎵'; }).catch(() => {});
        });

        target.addEventListener('targetLost', () => {
            scanning.classList.remove('hidden');
            bgm.pause(); musicPlaying = false; musicIco.textContent = '🔇';
        });

        // === Music toggle ===
        musicBtn.addEventListener('click', e => {
            e.stopPropagation();
            if (musicPlaying) { bgm.pause(); musicPlaying = false; musicIco.textContent = '🔇'; }
            else { bgm.play().then(() => { musicPlaying = true; musicIco.textContent = '🎵'; }).catch(() => {}); }
        });
    </script>
</body>
</html>
