<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilar Target AR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 40px; }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        .sub { color: rgba(255,255,255,0.5); margin-bottom: 30px; }
        .preview { max-width: 280px; border-radius: 8px; border: 3px solid rgba(255,255,255,0.15); margin-bottom: 20px; }
        #log { text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 0.82rem; max-height: 300px; overflow-y: auto; margin: 15px 0; line-height: 1.7; }
        .ok { color: #4ade80; } .warn { color: #fbbf24; } .err { color: #f87171; }
        .bar { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin: 10px 0; }
        .fill { height: 100%; background: linear-gradient(90deg, #ec4899, #a855f7); width: 0%; transition: width 0.3s; }
        .dl { display: inline-block; margin-top: 15px; padding: 14px 30px; background: linear-gradient(135deg, #ec4899, #a855f7); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; }
        .hide { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Compilador AR</h1>
        <p class="sub">Generando archivo .mind para tu collage</p>
        <img class="preview" src="./assets/collage-cuadro.png" alt="Collage">
        <div class="bar"><div class="fill" id="pbar"></div></div>
        <div id="log"></div>
        <a id="dl" class="dl hide" href="#" download="cuadro.mind">📥 Descargar cuadro.mind</a>
        <p id="note" class="hide" style="margin-top:15px;color:#4ade80;font-size:0.9rem;">✅ Guarda el archivo en <code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;">assets/cuadro.mind</code></p>
    </div>

    <!-- Load MindAR compiler as ES module from local files -->
    <script type="module">
        import { Compiler } from './lib/mindar-image.prod.js';

        const pbar = document.getElementById('pbar');
        const logEl = document.getElementById('log');
        function log(m, c) { const d = document.createElement('div'); if(c) d.className = c; d.textContent = m; logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight; }

        async function compile() {
            try {
                log('✅ MindAR Compiler cargado', 'ok');

                log('🖼️  Cargando collage...');
                const img = new Image();
                await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = './assets/collage-cuadro.png?' + Date.now(); });
                log(`✅ Imagen: ${img.naturalWidth}x${img.naturalHeight}`, 'ok');

                log('🔮 Compilando (30-60 seg)...', 'warn');
                const compiler = new Compiler();
                await compiler.compileImageTargets([img], p => {
                    const pct = Math.round(p * 100);
                    pbar.style.width = pct + '%';
                    if (pct % 10 === 0) log(`   ${pct}%`);
                });

                log('📦 Exportando .mind...');
                const buf = await compiler.exportData();
                pbar.style.width = '100%';

                const blob = new Blob([buf]);
                const dl = document.getElementById('dl');
                dl.href = URL.createObjectURL(blob);
                dl.classList.remove('hide');
                document.getElementById('note').classList.remove('hide');
                log(`🎉 ¡LISTO! ${(blob.size/1024).toFixed(0)} KB`, 'ok');
                dl.click();
            } catch (e) {
                log('❌ ' + e.message, 'err');
                console.error(e);
            }
        }

        compile();
    </script>
</body>
</html>
